# Common CI Pipeline
# 触发条件: 所有推送到 main 或面向 main 的 PR

name: Common CI

on:
  push:
    branches: [ main ]
    paths:
      - 'godot/.editorconfig'
      - 'godot/Sideline.csproj'
      - 'godot/Sideline.sln'
      - 'godot/project.godot'
      - 'godot/addons/facet-tools/**'
      - 'godot/scenes/**'
      - 'godot/scripts/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: common-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  common-build:
    name: Common Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Sideline Project
      run: dotnet restore godot/Sideline.csproj

    - name: Build Sideline Project
      run: dotnet build godot/Sideline.csproj --no-restore --configuration Debug -nologo
