# Common CI Pipeline
# 触发条件: 所有推送到 main 或面向 main 的 PR

name: Common CI

on:
  push:
    branches: [ main ]
    paths:
      - 'NuGet.Config'
      - 'godot/.editorconfig'
      - 'godot/Sideline.csproj'
      - 'godot/Sideline.sln'
      - 'godot/project.godot'
      - 'godot/addons/facet-tools/**'
      - 'godot/scenes/**'
      - 'godot/scripts/**'
      - '.github/actions/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'NuGet.Config'
      - 'godot/.editorconfig'
      - 'godot/Sideline.csproj'
      - 'godot/Sideline.sln'
      - 'godot/project.godot'
      - 'godot/addons/facet-tools/**'
      - 'godot/scenes/**'
      - 'godot/scripts/**'
      - '.github/actions/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: common-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  common-build:
    name: Common Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Build Sideline Project
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/Sideline.csproj
          godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj
          godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj
          NuGet.Config
        script: |
          dotnet restore godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj --configfile NuGet.Config
          dotnet restore godot/Sideline.csproj --configfile NuGet.Config
          dotnet build godot/Sideline.csproj --no-restore --configuration Debug -nologo

    - name: Summarize common build
      if: always()
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Common Build',
          '',
          ('- Status: `{0}`' -f '${{ job.status }}'),
          '- Role: `minimum Sideline health check`',
          '- Cache: `enabled`',
          '- Target: `godot/Sideline.csproj`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
