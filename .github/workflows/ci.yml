# Common CI Pipeline
# 触发条件: 所有推送到 main 或面向 main 的 PR

name: Common CI

on:
  push:
    branches: [ main ]
    paths:
      - 'godot/.editorconfig'
      - 'godot/Sideline.csproj'
      - 'godot/Sideline.sln'
      - 'godot/project.godot'
      - 'godot/addons/facet-tools/**'
      - 'godot/scenes/**'
      - 'godot/scripts/**'
      - '.github/actions/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: common-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  common-build:
    name: Common Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Build Sideline Project
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/Sideline.csproj
        script: |
          dotnet restore godot/Sideline.csproj
          dotnet build godot/Sideline.csproj --no-restore --configuration Debug -nologo

    - name: Summarize common build
      if: always()
      shell: pwsh
      run: |
        $summary = @"
        ## Common Build

        - Status: `${{ job.status }}`
        - Role: `main branch minimum Sideline health check`
        - Cache: `enabled`
        - Target: `godot/Sideline.csproj`
        "@

        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
