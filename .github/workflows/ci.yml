# Lattice CI Pipeline
# 触发条件: push 到 main 分支 或 pull request

name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'godot/scripts/lattice/**'
      - 'godot/scripts/lattice/Tests/**'
      - 'godot/scripts/lattice/Lattice.Tests.csproj'
      - 'godot/Lattice.Benchmarks/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'godot/scripts/lattice/**'
      - 'godot/scripts/lattice/Tests/**'
      - 'godot/scripts/lattice/Lattice.Tests.csproj'
      - 'godot/Lattice.Benchmarks/**'
      - '.github/workflows/**'

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  # ==================== 0. 代码格式检查 ====================
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        cd godot/scripts/lattice
        dotnet restore

    - name: Check Code Format
      run: |
        cd godot/scripts/lattice
        echo "=== 检查代码格式 ==="
        dotnet format --verify-no-changes --verbosity detailed
        
    - name: Fix Code Format (Auto-fix suggestions)
      if: failure()
      run: |
        echo "::error::代码格式检查失败！请在本地运行以下命令修复："
        echo ""
        echo "  cd godot/scripts/lattice"
        echo "  dotnet format"
        echo ""
        echo "然后提交更改。"
        exit 1

  # ==================== 1. 构建与测试 (多平台 × 多配置) ====================
  build-and-test:
    name: Build & Test (${{ matrix.os }}, ${{ matrix.configuration }})
    needs: format-check  # 格式检查通过后才会执行
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-14]
        configuration: [Debug, Release]
        include:
          # 确保 macos-14 是 ARM64 架构
          - os: macos-14
            arch: ARM64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-${{ matrix.arch }}-${{ matrix.configuration }}-nuget-${{ hashFiles('**/Lattice.Tests.csproj', '**/Lattice.csproj') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.arch }}-nuget-
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: |
        cd godot/scripts/lattice/Tests
        dotnet restore

    - name: Build (${{ matrix.configuration }})
      run: |
        cd godot/scripts/lattice/Tests
        dotnet build --no-restore --configuration ${{ matrix.configuration }}

    # 运行所有测试（包括 SIMD 和 Unsafe）
    - name: Test (${{ matrix.configuration }})
      timeout-minutes: 10
      shell: bash
      run: |
        cd godot/scripts/lattice/Tests
        export DOTNET_DbgEnableMiniDump=1
        export DOTNET_DbgMiniDumpType=1
        export DOTNET_DbgMiniDumpName="$PWD/coredump.%p"
        # 使用单线程模式避免 macOS ARM64 上的线程竞争问题
        dotnet test --no-build --verbosity normal --configuration ${{ matrix.configuration }} --maxcpucount:1 --blame-crash --blame-hang-timeout 5m
        # 如果测试失败，尝试找到并上传 dump 文件
        ls -la coredump* 2>/dev/null || echo "No crash dumps found"

    # SIMD 专项测试
    - name: SIMD Tests
      timeout-minutes: 5
      run: |
        cd godot/scripts/lattice/Tests
        dotnet test --no-build --configuration ${{ matrix.configuration }} --filter "FullyQualifiedName~SIMD" --maxcpucount:1 --blame-crash

    # Unsafe 代码测试
    - name: Unsafe Code Tests
      timeout-minutes: 5
      run: |
        cd godot/scripts/lattice/Tests
        dotnet test --no-build --configuration ${{ matrix.configuration }} --filter "FullyQualifiedName~Unsafe" --maxcpucount:1 --blame-crash

    # 本地确定性验证（单平台内多次运行一致性）
    - name: Local Determinism Check
      if: matrix.os == 'ubuntu-latest' && matrix.configuration == 'Release'
      shell: bash
      run: |
        set -e
        cd godot/scripts/lattice/Tests
        
        echo "=== Local Determinism Verification ==="
        
        # 第一次运行
        dotnet test --filter "FullyQualifiedName~Determinism" \
          --logger "trx;LogFileName=run1.trx" \
          --results-directory ./test-results \
          --verbosity minimal --maxcpucount:1
        
        # 第二次运行
        dotnet test --filter "FullyQualifiedName~Determinism" \
          --logger "trx;LogFileName=run2.trx" \
          --results-directory ./test-results \
          --verbosity minimal --maxcpucount:1
        
        # 提取并比较测试名称
        grep -oE 'testName="[^"]+"' ./test-results/run1.trx | \
          sed 's/testName="//;s/"$//' | sort > /tmp/tests1.txt
        grep -oE 'testName="[^"]+"' ./test-results/run2.trx | \
          sed 's/testName="//;s/"$//' | sort > /tmp/tests2.txt
        
        if ! diff /tmp/tests1.txt /tmp/tests2.txt > /tmp/test_diff.txt 2>&1; then
          echo "❌ FAILED: Test lists differ!"
          cat /tmp/test_diff.txt
          exit 1
        fi
        
        # 提取并比较结果
        paste -d':' \
          <(grep -oE 'testName="[^"]+"' ./test-results/run1.trx | sed 's/testName="//;s/"$//') \
          <(grep -oE 'outcome="[^"]+"' ./test-results/run1.trx | sed 's/outcome="//;s/"$//') | \
          sort > /tmp/results1.txt
        
        paste -d':' \
          <(grep -oE 'testName="[^"]+"' ./test-results/run2.trx | sed 's/testName="//;s/"$//') \
          <(grep -oE 'outcome="[^"]+"' ./test-results/run2.trx | sed 's/outcome="//;s/"$//') | \
          sort > /tmp/results2.txt
        
        if ! diff /tmp/results1.txt /tmp/results2.txt > /tmp/result_diff.txt 2>&1; then
          echo "❌ FAILED: Test outcomes differ!"
          cat /tmp/result_diff.txt
          exit 1
        fi
        
        echo "✓ SUCCESS: Local determinism verified!"

    # 上传测试结果用于跨平台确定性验证
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.configuration }}${{ matrix.arch && format('-{0}', matrix.arch) || '' }}
        path: godot/scripts/lattice/Tests/test-results/
        retention-days: 1
        if-no-files-found: ignore

  # ==================== 2. 跨平台确定性验证 ====================
  cross-platform-determinism:
    name: Cross-Platform Determinism
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always() && needs.build-and-test.result == 'success'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        cd godot/scripts/lattice/Tests
        dotnet restore

    - name: Build (Release)
      run: |
        cd godot/scripts/lattice/Tests
        dotnet build --no-restore --configuration Release

    # 运行确定性测试并捕获输出
    - name: Run Determinism Tests with Checksums
      shell: bash
      run: |
        cd godot/scripts/lattice/Tests
        
        # 使用固定种子运行测试，输出详细日志和校验和
        dotnet test --configuration Release \
          --filter "FullyQualifiedName~Determinism" \
          --logger "console;verbosity=detailed" \
          --results-directory ./cross-platform-results \
          --logger "trx;LogFileName=cross-platform.trx" \
          --verbosity normal --maxcpucount:1 2>&1 | tee test-output.txt
        
        # 提取所有校验和输出（假设测试输出包含 CHECKSUM: 前缀）
        grep -oE 'CHECKSUM:[0-9a-fA-F]+' test-output.txt | sort > checksums.txt || echo "No checksums found in output"
        
        # 如果测试输出中没有校验和，使用测试结果的哈希作为替代
        if [ ! -s checksums.txt ]; then
          echo "Using test outcome hashes as checksums..."
          grep -oE 'outcome="[^"]+"' ./cross-platform-results/cross-platform.trx | \
            sha256sum | awk '{print "CHECKSUM:" $1}' > checksums.txt
        fi
        
        cat checksums.txt
        echo "checksums=$(cat checksums.txt | tr '\n' ',')" >> $GITHUB_ENV

    - name: Upload Cross-Platform Results
      uses: actions/upload-artifact@v4
      with:
        name: determinism-linux-checksums
        path: |
          godot/scripts/lattice/Tests/checksums.txt
          godot/scripts/lattice/Tests/cross-platform-results/
        retention-days: 1

    # 模拟跨平台比较（实际项目中这里会上传并与 Windows/macOS 结果比较）
    - name: Verify Determinism Report
      run: |
        echo "=== Cross-Platform Determinism Verification ==="
        echo "Platform: ubuntu-latest (baseline)"
        echo "Checksums captured:"
        cat godot/scripts/lattice/Tests/checksums.txt
        echo ""
        echo "✓ Linux baseline captured. In multi-platform setup, this would be compared with:"
        echo "  - windows-latest"
        echo "  - macos-latest (x64)"
        echo "  - macos-14 (ARM64)"

  # ==================== 3. SIMD 验证 ====================
  simd-validation:
    name: SIMD Validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-14]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        cd godot/scripts/lattice/Tests
        dotnet restore

    - name: Build (Release)
      run: |
        cd godot/scripts/lattice/Tests
        dotnet build --no-restore --configuration Release

    # 检查 SIMD 硬件加速状态
    - name: Check SIMD Hardware Acceleration
      shell: bash
      run: |
        cd godot/scripts/lattice/Tests
        
        echo "=== SIMD Hardware Acceleration Check ==="
        dotnet test --configuration Release \
          --filter "FullyQualifiedName~CheckHardwareAcceleration" \
          --logger "console;verbosity=detailed" --maxcpucount:1 2>&1 | tee simd-check.txt
        
        # 检查输出中是否包含加速信息
        if grep -q "Vector.IsHardwareAccelerated.*True" simd-check.txt; then
          echo "✓ SIMD hardware acceleration is ENABLED"
        elif grep -q "Vector.IsHardwareAccelerated.*False" simd-check.txt; then
          echo "⚠ SIMD hardware acceleration is DISABLED (software fallback)"
        else
          echo "ℹ️ SIMD acceleration status unknown or test not found"
        fi
        
        # 显示平台信息
        echo ""
        echo "=== Platform Information ==="
        dotnet --info | head -20

    # SIMD 与标量结果比较
    - name: SIMD vs Scalar Comparison
      shell: bash
      run: |
        cd godot/scripts/lattice/Tests
        
        echo "=== SIMD vs Scalar Results Comparison ==="
        
        # 运行 SIMD 测试
        dotnet test --configuration Release \
          --filter "FullyQualifiedName~SIMD" \
          --logger "trx;LogFileName=simd.trx" \
          --results-directory ./simd-results --maxcpucount:1
        
        # 检查 SIMD 和标量结果是否一致
        dotnet test --configuration Release \
          --filter "FullyQualifiedName~SIMDvsScalar" \
          --logger "console;verbosity=detailed" --maxcpucount:1
        
        echo "✓ SIMD validation completed on ${{ matrix.os }}"

    - name: Upload SIMD Results
      uses: actions/upload-artifact@v4
      with:
        name: simd-results-${{ matrix.os }}
        path: godot/scripts/lattice/Tests/simd-results/
        retention-days: 7
        if-no-files-found: ignore

  # ==================== 4. Unsafe 代码编译验证 ====================
  unsafe-validation:
    name: Unsafe Code Validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        cd godot/scripts/lattice/Tests
        dotnet restore

    # 验证 Unsafe 代码能够编译
    - name: Compile Unsafe Code
      run: |
        cd godot/scripts/lattice/Tests
        echo "=== Compiling with Unsafe Code Support ==="
        dotnet build --no-restore --configuration ${{ matrix.configuration }} -p:AllowUnsafeBlocks=true
        echo "✓ Unsafe code compiled successfully on ${{ matrix.os }} (${{ matrix.configuration }})"

    # 运行 Unsafe 相关测试
    - name: Run Unsafe Tests
      shell: bash
      run: |
        cd godot/scripts/lattice/Tests
        dotnet test --no-build --configuration ${{ matrix.configuration }} \
          --filter "FullyQualifiedName~Unsafe" \
          --verbosity normal --maxcpucount:1

  # ==================== 5. Analyzer 验证 ====================
  analyzer-validation:
    name: Analyzer Validation
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/Lattice.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies for Lattice project
      run: |
        cd godot/scripts/lattice
        dotnet restore

    - name: Build Lattice project with analyzers enabled
      run: |
        cd godot/scripts/lattice
        dotnet build --no-restore --configuration Release -p:TreatWarningsAsErrors=true

    - name: Run dotnet format
      run: |
        cd godot/scripts/lattice
        dotnet format --verify-no-changes --verbosity detailed

  # ==================== 6. 代码覆盖率 ====================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        cd godot/scripts/lattice/Tests
        dotnet restore

    - name: Build
      run: |
        cd godot/scripts/lattice/Tests
        dotnet build --configuration Release

    - name: Test with Coverage
      shell: bash
      run: |
        cd godot/scripts/lattice/Tests
        dotnet test --configuration Release \
          --verbosity minimal --maxcpucount:1 \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:CoverletOutput=./coverage/coverage.cobertura.xml

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate HTML Report
      shell: bash
      run: |
        cd godot/scripts/lattice/Tests
        reportgenerator \
          -reports:"./coverage/coverage.cobertura.xml" \
          -targetdir:"./coverage/report" \
          -reporttypes:"Html;MarkdownSummaryGithub"

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: godot/scripts/lattice/Tests/coverage/report/
        retention-days: 30

    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: godot/scripts/lattice/Tests/coverage/coverage.cobertura.xml
        flags: unittests
        name: lattice-coverage
        fail_ci_if_error: false

  # ==================== 7. PR 轻量基准验证 ====================
  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: build-and-test

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Benchmark Project
      run: |
        cd godot/Lattice.Benchmarks
        dotnet restore

    - name: Clean Benchmark Artifacts
      shell: bash
      run: |
        rm -rf godot/Lattice.Benchmarks/benchmark-results

    - name: Run Benchmark Smoke
      shell: bash
      run: |
        cd godot/Lattice.Benchmarks
        dotnet run --configuration Release -- --filter "*EntityMicroBenchmarks.SingleValidate*" --exporters json html markdown

    - name: Debug Benchmark Output Paths
      if: always()
      shell: bash
      run: |
        echo "=== Benchmark Output Files ==="
        find godot/Lattice.Benchmarks -maxdepth 3 \
          \( -path '*/benchmark-results/*' -o -path '*/BenchmarkDotNet.Artifacts/*' -o -name '*.log' -o -name '*-report-github.md' -o -name '*-report.html' -o -name '*-report.csv' \) \
          -type f | sort

    - name: Validate Benchmark Smoke Output
      shell: bash
      run: |
        set -euo pipefail

        RESULTS_DIR="godot/Lattice.Benchmarks/benchmark-results"
        REPORT_DIR="$RESULTS_DIR/results"

        if [ ! -d "$RESULTS_DIR" ]; then
          echo "::error::Benchmark artifact directory not found: $RESULTS_DIR"
          exit 1
        fi

        if [ ! -d "$REPORT_DIR" ]; then
          echo "::error::Benchmark report directory not found: $REPORT_DIR"
          exit 1
        fi

        mapfile -t LOG_FILES < <(find "$RESULTS_DIR" -maxdepth 1 -type f -name '*.log' | sort)
        mapfile -t MARKDOWN_REPORTS < <(find "$REPORT_DIR" -maxdepth 1 -type f -name '*-report-github.md' | sort)

        if [ "${#LOG_FILES[@]}" -eq 0 ]; then
          echo "::error::No benchmark log files were generated."
          exit 1
        fi

        if [ "${#MARKDOWN_REPORTS[@]}" -eq 0 ]; then
          echo "::error::No benchmark markdown reports were generated."
          exit 1
        fi

        if grep -nE 'Build Error:|There are not any results runs' "${LOG_FILES[@]}"; then
          echo "::error::Benchmark logs contain execution failures."
          exit 1
        fi

        if grep -nE 'Benchmarks with issues:|\|[[:space:]]*[^|]+[[:space:]]*\|[[:space:]]*NA[[:space:]]*\|[[:space:]]*NA[[:space:]]*\|' "${MARKDOWN_REPORTS[@]}"; then
          echo "::error::Benchmark reports contain invalid or incomplete measurements."
          exit 1
        fi

    - name: Upload Benchmark Smoke Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-smoke-results
        path: godot/Lattice.Benchmarks/benchmark-results/
        retention-days: 14
        if-no-files-found: warn

  # ==================== 8. main 完整性能基准测试 ====================
  benchmark-publish:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # 恢复 Benchmark 项目依赖
    - name: Restore Benchmark Project
      run: |
        cd godot/Lattice.Benchmarks
        dotnet restore

    - name: Clean Benchmark Artifacts
      shell: bash
      run: |
        rm -rf godot/Lattice.Benchmarks/benchmark-results

    # 运行基准测试
    - name: Run Benchmarks
      shell: bash
      run: |
        cd godot/Lattice.Benchmarks
        dotnet run --configuration Release -- --filter "*" --exporters json html markdown

    - name: Debug Benchmark Output Paths
      if: always()
      shell: bash
      run: |
        echo "=== Benchmark Output Files ==="
        find godot/Lattice.Benchmarks -maxdepth 3 \
          \( -path '*/benchmark-results/*' -o -path '*/BenchmarkDotNet.Artifacts/*' -o -name '*.log' -o -name '*-report-github.md' -o -name '*-report.html' -o -name '*-report.csv' \) \
          -type f | sort

    - name: Validate Benchmark Execution
      shell: bash
      run: |
        set -euo pipefail

        RESULTS_DIR="godot/Lattice.Benchmarks/benchmark-results"
        REPORT_DIR="$RESULTS_DIR/results"

        if [ ! -d "$RESULTS_DIR" ]; then
          echo "::error::Benchmark artifact directory not found: $RESULTS_DIR"
          exit 1
        fi

        if [ ! -d "$REPORT_DIR" ]; then
          echo "::error::Benchmark report directory not found: $REPORT_DIR"
          exit 1
        fi

        mapfile -t LOG_FILES < <(find "$RESULTS_DIR" -maxdepth 1 -type f -name '*.log' | sort)
        mapfile -t MARKDOWN_REPORTS < <(find "$REPORT_DIR" -maxdepth 1 -type f -name '*-report-github.md' | sort)

        if [ "${#LOG_FILES[@]}" -eq 0 ]; then
          echo "::error::No benchmark log files were generated."
          exit 1
        fi

        if [ "${#MARKDOWN_REPORTS[@]}" -eq 0 ]; then
          echo "::error::No benchmark markdown reports were generated."
          exit 1
        fi

        if grep -nE 'Build Error:|There are not any results runs' "${LOG_FILES[@]}"; then
          echo "::error::Benchmark logs contain execution failures."
          exit 1
        fi

        if grep -nE 'Benchmarks with issues:|\|[[:space:]]*[^|]+[[:space:]]*\|[[:space:]]*NA[[:space:]]*\|[[:space:]]*NA[[:space:]]*\|' "${MARKDOWN_REPORTS[@]}"; then
          echo "::error::Benchmark reports contain invalid or incomplete measurements."
          exit 1
        fi

    - name: Generate Benchmark Index
      shell: bash
      run: |
        set -euo pipefail

        RESULTS_DIR="godot/Lattice.Benchmarks/benchmark-results"
        REPORT_DIR="$RESULTS_DIR/results"
        INDEX_FILE="$RESULTS_DIR/index.md"

        if [ ! -d "$REPORT_DIR" ]; then
          echo "::error::Benchmark report directory not found: $REPORT_DIR"
          exit 1
        fi

        mapfile -t MARKDOWN_REPORTS < <(find "$REPORT_DIR" -maxdepth 1 -type f -name '*-report-github.md' | sort)

        if [ "${#MARKDOWN_REPORTS[@]}" -eq 0 ]; then
          echo "::error::No benchmark markdown reports were generated."
          find "$RESULTS_DIR" -maxdepth 2 -type f | sort
          exit 1
        fi

        for MARKDOWN_REPORT in "${MARKDOWN_REPORTS[@]}"; do
          FILE_NAME="$(basename "$MARKDOWN_REPORT")"
          REPORT_BASE_NAME="${FILE_NAME%-report-github.md}"
          HTML_REPORT="$REPORT_DIR/${REPORT_BASE_NAME}-report.html"
          CSV_REPORT="$REPORT_DIR/${REPORT_BASE_NAME}-report.csv"

          if [ ! -f "$HTML_REPORT" ]; then
            echo "::error::Expected HTML benchmark report is missing: $HTML_REPORT"
            exit 1
          fi

          if [ ! -f "$CSV_REPORT" ]; then
            echo "::error::Expected CSV benchmark report is missing: $CSV_REPORT"
            exit 1
          fi
        done

        GENERATED_AT="$(date -u '+%Y-%m-%d %H:%M:%SZ')"
        SHORT_SHA="${GITHUB_SHA::8}"
        RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

        {
          echo "---"
          echo "layout: default"
          echo "title: 性能基准报告"
          echo "description: Lattice BenchmarkDotNet 自动生成性能报告"
          echo "---"
          echo
          echo "## 性能基准报告"
          echo
          echo "- 生成时间（UTC）: \`$GENERATED_AT\`"
          echo "- 分支: \`$GITHUB_REF_NAME\`"
          echo "- Commit: \`$SHORT_SHA\`"
          echo "- CI 运行: [$GITHUB_REPOSITORY #$GITHUB_RUN_ID]($RUN_URL)"
          echo
          echo "> 本页由 GitHub Actions 自动更新，结果用于固定 CI 环境下的性能回归跟踪，不直接代表所有设备上的绝对性能。"
          echo
          echo "| 报告 | HTML | Markdown | CSV |"
          echo "|------|------|----------|-----|"

          for MARKDOWN_REPORT in "${MARKDOWN_REPORTS[@]}"; do
            FILE_NAME="$(basename "$MARKDOWN_REPORT")"
            REPORT_BASE_NAME="${FILE_NAME%-report-github.md}"
            REPORT_LABEL="${REPORT_BASE_NAME#Lattice.Benchmarks.}"
            HTML_NAME="${REPORT_BASE_NAME}-report.html"
            CSV_NAME="${REPORT_BASE_NAME}-report.csv"

            echo "| $REPORT_LABEL | [查看](results/$HTML_NAME) | [摘要](results/$FILE_NAME) | [CSV](results/$CSV_NAME) |"
          done

          echo
          echo "### 原始日志"
          echo

          mapfile -t LOG_FILES < <(find "$RESULTS_DIR" -maxdepth 1 -type f -name '*.log' | sort)

          if [ "${#LOG_FILES[@]}" -eq 0 ]; then
            echo "- 无"
          else
            for LOG_FILE in "${LOG_FILES[@]}"; do
              LOG_NAME="$(basename "$LOG_FILE")"
              echo "- [$LOG_NAME]($LOG_NAME)"
            done
          fi
        } > "$INDEX_FILE"

    - name: Verify Benchmark Artifact
      shell: bash
      run: |
        set -euo pipefail
        echo "=== Benchmark Artifact Files ==="
        find godot/Lattice.Benchmarks/benchmark-results -maxdepth 2 -type f | sort

    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: godot/Lattice.Benchmarks/benchmark-results/
        retention-days: 90
        if-no-files-found: error

  # ==================== 9. 更新报告到 Docs ====================
  update-reports:
    name: Update Reports to Docs
    runs-on: ubuntu-latest
    needs: [coverage, benchmark-publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    
    steps:
    - name: Debug - Show Git Info
      run: |
        echo "=== Git Info ==="
        echo "Event name: ${{ github.event_name }}"
        echo "Ref: ${{ github.ref }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "SHA: ${{ github.sha }}"
    
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create Report Directories
      run: |
        mkdir -p ./docs/reports/coverage
        mkdir -p ./docs/reports/benchmark
    
    - name: Download Coverage Report
      uses: actions/download-artifact@v4
      with:
        name: coverage-report
        path: ./coverage-temp
    
    - name: Download Benchmark Results
      uses: actions/download-artifact@v4
      with:
        name: benchmark-results
        path: ./benchmark-temp
    
    - name: Debug - Before Copy
      run: |
        echo "=== Current Directory ==="
        pwd
        echo ""
        echo "=== List all files in current dir ==="
        ls -la
        echo ""
        echo "=== Check coverage-temp ==="
        if [ -d "./coverage-temp" ]; then
          echo "Directory exists"
          ls -la ./coverage-temp/ | head -20
          echo "File count: $(find ./coverage-temp -type f | wc -l)"
        else
          echo "Directory does NOT exist"
        fi
        echo ""
        echo "=== Check benchmark-temp ==="
        if [ -d "./benchmark-temp" ]; then
          echo "Directory exists"
          ls -la ./benchmark-temp/ | head -20
        else
          echo "Directory does NOT exist"
        fi
        echo ""
        echo "=== Check docs/reports ==="
        ls -la ./docs/reports/ 2>/dev/null || echo "Directory does NOT exist"
    
    - name: Copy Reports to Docs
      run: |
        set -x  # 开启调试模式
        
        # 检查 coverage artifact
        echo "=== Processing Coverage ==="
        if [ -d "./coverage-temp" ] && [ "$(ls -A ./coverage-temp)" ]; then
          echo "✓ Coverage artifact found"
          echo "Source files:"
          find ./coverage-temp -type f | head -10
          
          rm -rf ./docs/reports/coverage
          mkdir -p ./docs/reports/coverage
          
          # 复制文件（保留隐藏文件）
          cp -a ./coverage-temp/. ./docs/reports/coverage/
          echo "✓ Copied files"
          
          # 验证复制结果
          echo "Target files:"
          ls -la ./docs/reports/coverage/ | head -20
          echo "Total files in coverage: $(find ./docs/reports/coverage -type f | wc -l)"
          
          # 检查关键文件
          if [ -f "./docs/reports/coverage/index.html" ]; then
            echo "✓ index.html exists"
          else
            echo "⚠ index.html NOT found"
          fi
        else
          echo "✗ Coverage artifact not found or empty!"
          echo "Directory exists: $([ -d "./coverage-temp" ] && echo 'YES' || echo 'NO')"
          if [ -d "./coverage-temp" ]; then
            echo "Directory empty: $([ "$(ls -A ./coverage-temp)" ] && echo 'NO' || echo 'YES')"
          fi
          exit 1
        fi
        
        # 检查 benchmark artifact
        echo ""
        echo "=== Processing Benchmark ==="
        if [ -d "./benchmark-temp" ] && [ "$(ls -A ./benchmark-temp 2>/dev/null)" ]; then
          echo "✓ Benchmark artifact found"
          ls -la ./benchmark-temp/
          
          rm -rf ./docs/reports/benchmark
          mkdir -p ./docs/reports/benchmark
          cp -a ./benchmark-temp/. ./docs/reports/benchmark/
          echo "✓ Copied files"
          ls -la ./docs/reports/benchmark/
        else
          echo "✗ Benchmark artifact not found or empty!"
          exit 1
        fi
    
    - name: Debug - Final Report Structure
      run: |
        echo "=== Full Reports Directory Tree ==="
        find ./docs/reports -type f 2>/dev/null | sort | head -30
        echo ""
        echo "=== Coverage Directory Details ==="
        ls -laR ./docs/reports/coverage/ 2>/dev/null || echo "Directory not found"
        echo ""
        echo "=== Check index.html ==="
        if [ -f "./docs/reports/coverage/index.html" ]; then
          echo "✓ coverage/index.html EXISTS"
          echo "First 5 lines:"
          head -5 ./docs/reports/coverage/index.html
        else
          echo "✗ coverage/index.html NOT FOUND"
        fi
        echo ""
        echo "=== Git Status ==="
        git status --short
        echo ""
        echo "=== Git Diff (staged) ==="
        git diff --staged --stat
    
    - name: Commit and Push
      shell: bash
      run: |
        set -x
        
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        echo "=== Current Git Status (all files) ==="
        git status --untracked-files=all
        
        git add -A docs/reports/
        
        echo "=== Staged changes ==="
        git diff --staged --name-status
        
        # 检查是否有变更
        if git diff --staged --quiet; then
          echo "✓ No report changes to commit"
          exit 0
        else
          echo "=== Committing changes ==="
          COVERAGE_COUNT=$(find ./docs/reports/coverage -type f 2>/dev/null | wc -l)
          BENCHMARK_COUNT=$(find ./docs/reports/benchmark -type f 2>/dev/null | wc -l)
          
          git commit -m "docs: update CI reports [skip ci]" \
                     -m "Coverage: $COVERAGE_COUNT files" \
                     -m "Benchmark: $BENCHMARK_COUNT files"
          
          echo "=== Pushing to branch ==="
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
          echo "✓ Successfully pushed reports"
        fi
