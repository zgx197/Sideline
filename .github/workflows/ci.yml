# Lattice CI Pipeline
# 触发条件: push 到 main 分支 或 pull request

name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'godot/scripts/lattice/**'
      - 'godot/Lattice.Tests/**'
      - 'godot/Lattice.Benchmarks/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'godot/scripts/lattice/**'
      - 'godot/Lattice.Tests/**'
      - 'godot/Lattice.Benchmarks/**'

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  # ==================== 1. 构建与测试 (多平台) ====================
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/Lattice.Tests.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: |
        cd godot/Lattice.Tests
        dotnet restore

    - name: Build
      run: |
        cd godot/Lattice.Tests
        dotnet build --no-restore --configuration Release

    # 运行测试
    - name: Test
      run: |
        cd godot/Lattice.Tests
        dotnet test --no-build --verbosity normal --configuration Release

    # 确定性验证
    - name: Determinism Check
      if: matrix.os == 'ubuntu-latest'
      run: |
        set -e
        cd godot/Lattice.Tests
        
        echo "=== Determinism Verification ==="
        
        # 第一次运行
        dotnet test --filter "FullyQualifiedName~Determinism" \
          --logger "trx;LogFileName=run1.trx" \
          --results-directory ./test-results \
          --verbosity minimal
        
        # 第二次运行
        dotnet test --filter "FullyQualifiedName~Determinism" \
          --logger "trx;LogFileName=run2.trx" \
          --results-directory ./test-results \
          --verbosity minimal
        
        # 提取并比较测试名称
        grep -oE 'testName="[^"]+"' ./test-results/run1.trx | \
          sed 's/testName="//;s/"$//' | sort > /tmp/tests1.txt
        grep -oE 'testName="[^"]+"' ./test-results/run2.trx | \
          sed 's/testName="//;s/"$//' | sort > /tmp/tests2.txt
        
        if ! diff /tmp/tests1.txt /tmp/tests2.txt > /tmp/test_diff.txt 2>&1; then
          echo "❌ FAILED: Test lists differ!"
          cat /tmp/test_diff.txt
          exit 1
        fi
        
        # 提取并比较结果
        paste -d':' \
          <(grep -oE 'testName="[^"]+"' ./test-results/run1.trx | sed 's/testName="//;s/"$//') \
          <(grep -oE 'outcome="[^"]+"' ./test-results/run1.trx | sed 's/outcome="//;s/"$//') | \
          sort > /tmp/results1.txt
        
        paste -d':' \
          <(grep -oE 'testName="[^"]+"' ./test-results/run2.trx | sed 's/testName="//;s/"$//') \
          <(grep -oE 'outcome="[^"]+"' ./test-results/run2.trx | sed 's/outcome="//;s/"$//') | \
          sort > /tmp/results2.txt
        
        if ! diff /tmp/results1.txt /tmp/results2.txt > /tmp/result_diff.txt 2>&1; then
          echo "❌ FAILED: Test outcomes differ!"
          cat /tmp/result_diff.txt
          exit 1
        fi
        
        echo "✓ SUCCESS: Determinism verified!"

  # ==================== 2. 代码覆盖率 ====================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        cd godot/Lattice.Tests
        dotnet restore

    - name: Build
      run: |
        cd godot/Lattice.Tests
        dotnet build --configuration Release

    - name: Test with Coverage
      run: |
        cd godot/Lattice.Tests
        dotnet test --configuration Release \
          --verbosity minimal \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:CoverletOutput=./coverage/coverage.cobertura.xml

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate HTML Report
      run: |
        cd godot/Lattice.Tests
        reportgenerator \
          -reports:"./coverage/coverage.cobertura.xml" \
          -targetdir:"./coverage/report" \
          -reporttypes:"Html;MarkdownSummaryGithub"

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: godot/Lattice.Tests/coverage/report/
        retention-days: 30

    - name: Upload to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: godot/Lattice.Tests/coverage/coverage.cobertura.xml
        flags: unittests
        name: lattice-coverage
        fail_ci_if_error: false

  # ==================== 3. 性能基准测试 ====================
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # 恢复 Benchmark 项目依赖
    - name: Restore Benchmark Project
      run: |
        cd godot/Lattice.Benchmarks
        dotnet restore

    # 运行基准测试
    - name: Run Benchmarks
      run: |
        cd godot/Lattice.Benchmarks
        dotnet run --configuration Release -- --exporters json --artifacts ./benchmark-results

    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: godot/Lattice.Benchmarks/benchmark-results/
        retention-days: 90

  # ==================== 4. 更新报告到 Docs ====================
  update-reports:
    name: Update Reports to Docs
    runs-on: ubuntu-latest
    needs: [coverage, benchmark]
    # 只在 push 到 main 时更新报告（PR 不需要）
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create Report Directories
      run: |
        mkdir -p ./docs/reports/coverage
        mkdir -p ./docs/reports/benchmark
    
    - name: Download Coverage Report
      uses: actions/download-artifact@v4
      with:
        name: coverage-report
        path: ./coverage-temp
    
    - name: Download Benchmark Results (optional)
      uses: actions/download-artifact@v4
      with:
        name: benchmark-results
        path: ./benchmark-temp
      continue-on-error: true  # benchmark 可能不存在（如果 benchmark job 被跳过）
    
    - name: Copy Reports to Docs
      run: |
        # 检查并复制 coverage
        if [ -d "./coverage-temp" ] && [ "$(ls -A ./coverage-temp)" ]; then
          echo "✓ Coverage artifact found, copying..."
          cp -r ./coverage-temp/* ./docs/reports/coverage/
        else
          echo "✗ Coverage artifact not found or empty!"
          exit 1
        fi
        
        # 检查并复制 benchmark（可选）
        if [ -d "./benchmark-temp" ] && [ "$(ls -A ./benchmark-temp 2>/dev/null)" ]; then
          echo "✓ Benchmark artifact found, copying..."
          cp -r ./benchmark-temp/* ./docs/reports/benchmark/
        else
          echo "⚠ Benchmark artifact not found (optional)"
        fi
    
    - name: Create .nojekyll Files
      run: |
        touch ./docs/reports/coverage/.nojekyll
        touch ./docs/reports/benchmark/.nojekyll
    
    - name: Debug - List Files
      run: |
        echo "=== Reports Directory Structure ==="
        find ./docs/reports -type f | head -20
        echo ""
        echo "=== Coverage Files ==="
        ls -la ./docs/reports/coverage/
        echo ""
        echo "=== Benchmark Files ==="
        ls -la ./docs/reports/benchmark/ 2>/dev/null || echo "No benchmark files"
    
    - name: Commit and Push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add docs/reports/
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "docs: update CI reports [skip ci]" \
                     -m "Coverage: $(find ./docs/reports/coverage -type f | wc -l) files" \
                     -m "Benchmark: $(find ./docs/reports/benchmark -type f 2>/dev/null | wc -l) files"
          git push
        fi
