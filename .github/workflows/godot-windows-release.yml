name: Godot Windows x64 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: godot-windows-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: '8.0.x'
  GODOT_VERSION: '4.6.1'
  GODOT_RELEASE_STATUS: 'stable'
  GODOT_PRODUCT_FLAVOR: 'mono'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      package_name: ${{ steps.metadata.outputs.package_name }}
      release_title: ${{ steps.metadata.outputs.release_title }}
      artifact_export_name: ${{ steps.metadata.outputs.artifact_export_name }}
      artifact_package_name: ${{ steps.metadata.outputs.artifact_package_name }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Resolve metadata
      id: metadata
      shell: pwsh
      run: |
        $metadata = & "$env:GITHUB_WORKSPACE/tools/release/shared/Resolve-ReleaseMetadata.ps1" -Version '${{ github.ref_name }}'
        "version=$($metadata.Version)" >> $env:GITHUB_OUTPUT
        "package_name=$($metadata.PackageName)" >> $env:GITHUB_OUTPUT
        "release_title=$($metadata.ReleaseTitle)" >> $env:GITHUB_OUTPUT
        "artifact_export_name=$($metadata.ArtifactExportName)-$($metadata.VersionWithoutPrefix)" >> $env:GITHUB_OUTPUT
        "artifact_package_name=$($metadata.ArtifactPackageName)-$($metadata.VersionWithoutPrefix)" >> $env:GITHUB_OUTPUT

    - name: Summarize prepare
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Godot Windows x64 Release / Prepare',
          '',
          '- Version: `${{ steps.metadata.outputs.version }}`',
          '- Package: `${{ steps.metadata.outputs.package_name }}`',
          '- Release title: `${{ steps.metadata.outputs.release_title }}`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  export-package:
    name: Export, Smoke Test and Package Windows x64
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: true
        cache-dependency-path: |
          godot/Sideline.sln
          godot/Sideline.csproj
          godot/scripts/lattice/Lattice.csproj
          godot/scripts/facet/Facet.Core.csproj
          godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj
          godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj
          NuGet.Config

    - name: Prepare release directories
      id: dirs
      shell: pwsh
      run: |
        $appDataRoot = Join-Path $env:RUNNER_TEMP 'godot-appdata'
        $toolchainRoot = Join-Path $env:RUNNER_TEMP 'godot-toolchain'
        $outputRoot = Join-Path $env:RUNNER_TEMP 'sideline-release'

        New-Item -ItemType Directory -Path $appDataRoot -Force | Out-Null
        New-Item -ItemType Directory -Path $toolchainRoot -Force | Out-Null
        New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null

        "appdata_root=$appDataRoot" >> $env:GITHUB_OUTPUT
        "toolchain_root=$toolchainRoot" >> $env:GITHUB_OUTPUT
        "output_root=$outputRoot" >> $env:GITHUB_OUTPUT

    - name: Restore release build dependencies
      shell: pwsh
      run: |
        & dotnet restore godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj --configfile NuGet.Config
        if ($LASTEXITCODE -ne 0) { throw "restore SwizzleGenerator 失败，ExitCode=$LASTEXITCODE" }

        & dotnet restore godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj --configfile NuGet.Config
        if ($LASTEXITCODE -ne 0) { throw "restore Lattice.Analyzers 失败，ExitCode=$LASTEXITCODE" }

        & dotnet restore godot/Sideline.csproj --configfile NuGet.Config
        if ($LASTEXITCODE -ne 0) { throw "restore Sideline 失败，ExitCode=$LASTEXITCODE" }

    - name: Install Godot export toolchain
      shell: pwsh
      run: |
        & "$env:GITHUB_WORKSPACE/tools/release/shared/Install-GodotToolchain.ps1" `
          -GodotVersion '${{ env.GODOT_VERSION }}' `
          -ReleaseStatus '${{ env.GODOT_RELEASE_STATUS }}' `
          -ProductFlavor '${{ env.GODOT_PRODUCT_FLAVOR }}' `
          -InstallRoot '${{ steps.dirs.outputs.toolchain_root }}' `
          -AppDataRoot '${{ steps.dirs.outputs.appdata_root }}'

    - name: Export Windows x64
      id: export
      shell: pwsh
      run: |
        $export = & "$env:GITHUB_WORKSPACE/tools/release/windows-x64/Export-WindowsX64Release.ps1" `
          -Version '${{ needs.prepare.outputs.version }}' `
          -RepoRoot $env:GITHUB_WORKSPACE `
          -ProjectDir (Join-Path $env:GITHUB_WORKSPACE 'godot') `
          -OutputRoot '${{ steps.dirs.outputs.output_root }}' `
          -InstallRoot '${{ steps.dirs.outputs.toolchain_root }}' `
          -AppDataRoot '${{ steps.dirs.outputs.appdata_root }}'

        "publish_dir=$($export.PublishDir)" >> $env:GITHUB_OUTPUT
        "export_log=$($export.ExportLog)" >> $env:GITHUB_OUTPUT

    - name: Upload export logs
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: sideline-win-x64-export-logs-${{ needs.prepare.outputs.version }}
        path: ${{ steps.dirs.outputs.output_root }}/logs
        if-no-files-found: warn

    - name: Smoke test Windows x64 release
      id: smoke
      shell: pwsh
      run: |
        $smoke = & "$env:GITHUB_WORKSPACE/tools/release/windows-x64/Test-WindowsX64ReleaseSmoke.ps1" `
          -PublishDir '${{ steps.export.outputs.publish_dir }}'

        "console_log=$($smoke.ConsoleLogPath)" >> $env:GITHUB_OUTPUT
        "structured_log=$($smoke.StructuredLogPath)" >> $env:GITHUB_OUTPUT

    - name: Package Windows x64
      id: package
      shell: pwsh
      run: |
        $package = & "$env:GITHUB_WORKSPACE/tools/release/windows-x64/Package-WindowsX64Release.ps1" `
          -Version '${{ needs.prepare.outputs.version }}' `
          -PublishDir '${{ steps.export.outputs.publish_dir }}' `
          -OutputRoot '${{ steps.dirs.outputs.output_root }}' `
          -RepoRoot $env:GITHUB_WORKSPACE

        "package_path=$($package.PackagePath)" >> $env:GITHUB_OUTPUT

    - name: Upload publish artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ needs.prepare.outputs.artifact_export_name }}
        path: ${{ steps.export.outputs.publish_dir }}
        if-no-files-found: error

    - name: Upload package artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ needs.prepare.outputs.artifact_package_name }}
        path: ${{ steps.package.outputs.package_path }}
        if-no-files-found: error

    - name: Summarize export and package
      if: always()
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Godot Windows x64 Release / Export and Package',
          '',
          ('- Status: `{0}`' -f '${{ job.status }}'),
          '- Version: `${{ needs.prepare.outputs.version }}`',
          '- Publish artifact: `${{ needs.prepare.outputs.artifact_export_name }}`',
          '- Package artifact: `${{ needs.prepare.outputs.artifact_package_name }}`',
          '- Export logs artifact: `sideline-win-x64-export-logs-${{ needs.prepare.outputs.version }}`',
          '- Smoke console log: `${{ steps.smoke.outputs.console_log }}`',
          '- Smoke structured log: `${{ steps.smoke.outputs.structured_log }}`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  publish-release:
    name: Publish GitHub Release
    needs: [prepare, export-package]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Download package artifact
      uses: actions/download-artifact@v8
      with:
        name: ${{ needs.prepare.outputs.artifact_package_name }}
        path: ${{ runner.temp }}/release-package

    - name: Generate release notes
      id: notes
      shell: pwsh
      run: |
        $notesPath = Join-Path $env:RUNNER_TEMP 'godot-release-notes.md'
        & "$env:GITHUB_WORKSPACE/tools/release/github-release/New-GitHubReleaseNotes.ps1" `
          -Version '${{ needs.prepare.outputs.version }}' `
          -PackageName '${{ needs.prepare.outputs.package_name }}' `
          -OutputPath $notesPath

        "notes_path=$notesPath" >> $env:GITHUB_OUTPUT

    - name: Publish GitHub release
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $packagePath = Join-Path (Join-Path $env:RUNNER_TEMP 'release-package') '${{ needs.prepare.outputs.package_name }}'
        & "$env:GITHUB_WORKSPACE/tools/release/github-release/Publish-GitHubRelease.ps1" `
          -Version '${{ needs.prepare.outputs.version }}' `
          -PackagePath $packagePath `
          -NotesPath '${{ steps.notes.outputs.notes_path }}' `
          -Repository '${{ github.repository }}' `
          -TargetCommitish '${{ github.sha }}'

    - name: Summarize publish release
      if: always()
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Godot Windows x64 Release / Publish',
          '',
          ('- Status: `{0}`' -f '${{ job.status }}'),
          '- Version: `${{ needs.prepare.outputs.version }}`',
          '- Release title: `${{ needs.prepare.outputs.release_title }}`',
          '- Asset: `${{ needs.prepare.outputs.package_name }}`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
