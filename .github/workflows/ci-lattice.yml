name: Lattice CI

on:
  push:
    branches: [ main ]
    paths:
      - 'NuGet.Config'
      - 'godot/.editorconfig'
      - 'godot/Sideline.sln'
      - 'godot/scripts/lattice/**'
      - 'godot/Lattice.Benchmarks/**'
      - '.github/actions/**'
      - '.github/workflows/ci-lattice.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'NuGet.Config'
      - 'godot/.editorconfig'
      - 'godot/Sideline.sln'
      - 'godot/scripts/lattice/**'
      - 'godot/Lattice.Benchmarks/**'
      - '.github/actions/**'
      - '.github/workflows/ci-lattice.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lattice-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  lattice-format:
    name: Lattice Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Verify Lattice format
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/scripts/lattice/Lattice.csproj
          godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj
          godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj
          NuGet.Config
        script: |
          dotnet restore godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Lattice.csproj --configfile NuGet.Config
          dotnet format whitespace godot/scripts/lattice/Lattice.csproj --verify-no-changes --verbosity detailed --no-restore
          dotnet format style godot/scripts/lattice/Lattice.csproj --verify-no-changes --verbosity detailed --no-restore

    - name: Summarize lattice format
      if: always()
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Lattice Format Check',
          '',
          ('- Status: `{0}`' -f '${{ job.status }}'),
          '- Cache: `enabled`',
          '- Target: `godot/scripts/lattice/Lattice.csproj`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  lattice-build-test:
    name: Lattice Build & Test (${{ matrix.os }}, ${{ matrix.configuration }})
    needs: lattice-format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Build and test Lattice suite
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/scripts/lattice/Lattice.csproj
          godot/scripts/lattice/Tests/Lattice.Tests.csproj
          godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj
          godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj
          NuGet.Config
        script: |
          dotnet restore godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Tests/Lattice.Tests.csproj --configfile NuGet.Config
          dotnet build godot/scripts/lattice/Tests/Lattice.Tests.csproj --no-restore --configuration ${{ matrix.configuration }} -nologo
          dotnet test godot/scripts/lattice/Tests/Lattice.Tests.csproj --no-build --configuration ${{ matrix.configuration }} -nologo --verbosity normal --maxcpucount:1

    - name: Summarize lattice build and test
      if: always()
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Lattice Build & Test (${{ matrix.os }}, ${{ matrix.configuration }})',
          '',
          ('- Status: `{0}`' -f '${{ job.status }}'),
          '- Cache: `enabled`',
          '- Target: `godot/scripts/lattice/Tests/Lattice.Tests.csproj`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  lattice-determinism:
    name: Lattice Determinism Validation
    runs-on: ubuntu-latest
    needs: lattice-build-test

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Validate Lattice determinism
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/scripts/lattice/Lattice.csproj
          godot/scripts/lattice/Tests/Lattice.Tests.csproj
          godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj
          godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj
          NuGet.Config
        script: |
          dotnet restore godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Tests/Lattice.Tests.csproj --configfile NuGet.Config
          dotnet build godot/scripts/lattice/Tests/Lattice.Tests.csproj --no-restore --configuration Release -nologo
          dotnet test godot/scripts/lattice/Tests/Lattice.Tests.csproj --no-build --configuration Release -nologo --filter "FullyQualifiedName‾Determinism" --verbosity normal --maxcpucount:1

    - name: Summarize lattice determinism
      if: always()
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Lattice Determinism Validation',
          '',
          ('- Status: `{0}`' -f '${{ job.status }}'),
          '- Cache: `enabled`',
          '- Filter: `FullyQualifiedName‾Determinism`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  lattice-analyzers:
    name: Lattice Analyzer Validation
    runs-on: ubuntu-latest
    needs: lattice-build-test

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Validate Lattice analyzers
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/scripts/lattice/Lattice.csproj
          godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj
          godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj
          NuGet.Config
        script: |
          dotnet restore godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Lattice.csproj --configfile NuGet.Config
          dotnet build godot/scripts/lattice/Lattice.csproj --no-restore --configuration Release -p:TreatWarningsAsErrors=true -nologo

    - name: Summarize lattice analyzers
      if: always()
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Lattice Analyzer Validation',
          '',
          ('- Status: `{0}`' -f '${{ job.status }}'),
          '- Cache: `enabled`',
          '- Mode: `TreatWarningsAsErrors=true`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  lattice-benchmark-smoke:
    name: Lattice Benchmark Smoke
    runs-on: ubuntu-latest
    needs: lattice-build-test

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Run Lattice benchmark smoke
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/scripts/lattice/Lattice.csproj
          godot/Lattice.Benchmarks/Lattice.Benchmarks.csproj
          godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj
          godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj
          NuGet.Config
        script: |
          dotnet restore godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj --configfile NuGet.Config
          dotnet restore godot/Lattice.Benchmarks/Lattice.Benchmarks.csproj --configfile NuGet.Config
          dotnet run --configuration Release --project godot/Lattice.Benchmarks/Lattice.Benchmarks.csproj -- --filter "*EntityMicroBenchmarks.SingleValidate*"

    - name: Summarize lattice benchmark smoke
      if: always()
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Lattice Benchmark Smoke',
          '',
          ('- Status: `{0}`' -f '${{ job.status }}'),
          '- Cache: `enabled`',
          '- Filter: `*EntityMicroBenchmarks.SingleValidate*`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
