name: Lattice CI

on:
  push:
    branches: [ main ]
    paths:
      - 'godot/.editorconfig'
      - 'godot/Sideline.sln'
      - 'godot/scripts/lattice/**'
      - 'godot/Lattice.Benchmarks/**'
      - '.github/workflows/ci-lattice.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  lattice-format:
    name: Lattice Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Lattice project
      run: dotnet restore godot/scripts/lattice/Lattice.csproj

    - name: Verify code format
      run: dotnet format godot/scripts/lattice/Lattice.csproj --verify-no-changes --verbosity detailed

  lattice-build-test:
    name: Lattice Build & Test (${{ matrix.os }}, ${{ matrix.configuration }})
    needs: lattice-format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        configuration: [Debug, Release]

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Lattice tests
      run: dotnet restore godot/scripts/lattice/Tests/Lattice.Tests.csproj

    - name: Build Lattice tests
      run: dotnet build godot/scripts/lattice/Tests/Lattice.Tests.csproj --no-restore --configuration ${{ matrix.configuration }} -nologo

    - name: Run Lattice tests
      run: dotnet test godot/scripts/lattice/Tests/Lattice.Tests.csproj --no-build --configuration ${{ matrix.configuration }} -nologo --verbosity normal --maxcpucount:1

  lattice-determinism:
    name: Lattice Determinism Validation
    runs-on: ubuntu-latest
    needs: lattice-build-test

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Lattice tests
      run: dotnet restore godot/scripts/lattice/Tests/Lattice.Tests.csproj

    - name: Build Lattice tests
      run: dotnet build godot/scripts/lattice/Tests/Lattice.Tests.csproj --no-restore --configuration Release -nologo

    - name: Run determinism suite
      run: dotnet test godot/scripts/lattice/Tests/Lattice.Tests.csproj --no-build --configuration Release -nologo --filter "FullyQualifiedName~Determinism" --verbosity normal --maxcpucount:1

  lattice-analyzers:
    name: Lattice Analyzer Validation
    runs-on: ubuntu-latest
    needs: lattice-build-test

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore Lattice project
      run: dotnet restore godot/scripts/lattice/Lattice.csproj

    - name: Build with analyzers enabled
      run: dotnet build godot/scripts/lattice/Lattice.csproj --no-restore --configuration Release -p:TreatWarningsAsErrors=true -nologo

  lattice-benchmark-smoke:
    name: Lattice Benchmark Smoke
    runs-on: ubuntu-latest
    needs: lattice-build-test

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore benchmark project
      run: dotnet restore godot/Lattice.Benchmarks/Lattice.Benchmarks.csproj

    - name: Run benchmark smoke
      run: dotnet run --configuration Release --project godot/Lattice.Benchmarks/Lattice.Benchmarks.csproj -- --filter "*EntityMicroBenchmarks.SingleValidate*"
