# Facet CI Pipeline
# 触发条件: Facet 模块、Facet 编辑器工具、主工程 Facet 集成层变更

name: Facet CI

on:
  push:
    branches: [ main ]
    paths:
      - 'NuGet.Config'
      - 'godot/.editorconfig'
      - 'godot/Sideline.csproj'
      - 'godot/Sideline.sln'
      - 'godot/project.godot'
      - 'godot/addons/facet-tools/**'
      - 'godot/scenes/main/**'
      - 'godot/scenes/ui/**'
      - 'godot/scripts/facet/**'
      - 'godot/scripts/main/**'
      - 'godot/scripts/ui/**'
      - 'godot/scripts/window/**'
      - '.github/actions/**'
      - '.github/workflows/ci-facet.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'NuGet.Config'
      - 'godot/.editorconfig'
      - 'godot/Sideline.csproj'
      - 'godot/Sideline.sln'
      - 'godot/project.godot'
      - 'godot/addons/facet-tools/**'
      - 'godot/scenes/main/**'
      - 'godot/scenes/ui/**'
      - 'godot/scripts/facet/**'
      - 'godot/scripts/main/**'
      - 'godot/scripts/ui/**'
      - 'godot/scripts/window/**'
      - '.github/actions/**'
      - '.github/workflows/ci-facet.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: facet-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  facet-core-build:
    name: Facet Core Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Build Facet Core Project
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/scripts/facet/Facet.Core.csproj
          NuGet.Config
        script: |
          dotnet restore godot/scripts/facet/Facet.Core.csproj --configfile NuGet.Config
          dotnet build godot/scripts/facet/Facet.Core.csproj --no-restore --configuration Release -nologo

    - name: Summarize facet core build
      if: always()
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Facet Core Build',
          '',
          ('- Status: `{0}`' -f '${{ job.status }}'),
          '- Cache: `enabled`',
          '- Target: `godot/scripts/facet/Facet.Core.csproj`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  facet-integration-build:
    name: Facet Integration Build
    runs-on: ubuntu-latest
    needs: facet-core-build

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Build Sideline Project
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/Sideline.csproj
          godot/scripts/facet/Facet.Core.csproj
          godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj
          godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj
          NuGet.Config
        script: |
          dotnet restore godot/scripts/lattice/Tools/SwizzleGenerator/SwizzleGenerator.csproj --configfile NuGet.Config
          dotnet restore godot/scripts/lattice/Tools/Lattice.Analyzers/Lattice.Analyzers.csproj --configfile NuGet.Config
          dotnet restore godot/Sideline.csproj --configfile NuGet.Config
          dotnet build godot/Sideline.csproj --no-restore --configuration Debug -nologo

    - name: Summarize facet integration build
      if: always()
      shell: pwsh
      run: |
        $summaryLines = @(
          '## Facet Integration Build',
          '',
          ('- Status: `{0}`' -f '${{ job.status }}'),
          '- Depends on: `Facet Core Build`',
          '- Cache: `enabled`',
          '- Target: `godot/Sideline.csproj`'
        )
        $summary = $summaryLines -join [Environment]::NewLine
        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
