name: PR Gate

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  change-classification:
    name: PR Gate / Change Classification
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.finalize.outputs.docs_only }}
      needs_lattice: ${{ steps.finalize.outputs.needs_lattice }}
      needs_sideline: ${{ steps.finalize.outputs.needs_sideline }}
      needs_format: ${{ steps.finalize.outputs.needs_format }}

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Classify validation scopes
      id: scopes
      uses: dorny/paths-filter@v4
      with:
        filters: .github/filters/ci-pr.yml

    - name: Detect docs-only change set
      id: docs_scope
      uses: dorny/paths-filter@v4
      with:
        predicate-quantifier: every
        filters: |
          docs_only:
            - 'README.md'
            - 'docs/**'

    - name: Finalize classification
      id: finalize
      shell: bash
      run: |
        set -euo pipefail

        docs_only="${{ steps.docs_scope.outputs.docs_only }}"
        needs_lattice="${{ steps.scopes.outputs.needs_lattice }}"
        needs_sideline="${{ steps.scopes.outputs.needs_sideline }}"
        needs_format="${{ steps.scopes.outputs.needs_format }}"

        if [ "$docs_only" != "true" ] && [ "$needs_lattice" != "true" ] && [ "$needs_sideline" != "true" ]; then
          needs_sideline=true
        fi

        {
          echo "docs_only=$docs_only"
          echo "needs_lattice=$needs_lattice"
          echo "needs_sideline=$needs_sideline"
          echo "needs_format=$needs_format"
        } >> "$GITHUB_OUTPUT"

    - name: Summarize classification
      shell: pwsh
      run: |
        $summary = @"
        ## PR Gate / Change Classification

        | Scope | Result |
        |------|--------|
        | docs_only | `${{ steps.finalize.outputs.docs_only }}` |
        | needs_format | `${{ steps.finalize.outputs.needs_format }}` |
        | needs_lattice | `${{ steps.finalize.outputs.needs_lattice }}` |
        | needs_sideline | `${{ steps.finalize.outputs.needs_sideline }}` |
        "@

        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  format-check:
    name: Code Format Check
    needs: change-classification
    runs-on: ubuntu-latest

    steps:
    - name: Skip format verification
      if: needs.change-classification.outputs.needs_format != 'true'
      run: echo "No lattice or CI workflow changes detected. Skipping format verification."

    - name: Checkout
      if: needs.change-classification.outputs.needs_format == 'true'
      uses: actions/checkout@v5

    - name: Verify Lattice format
      if: needs.change-classification.outputs.needs_format == 'true'
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/scripts/lattice/Lattice.csproj
        script: |
          dotnet restore godot/scripts/lattice/Lattice.csproj
          dotnet format godot/scripts/lattice/Lattice.csproj --verify-no-changes --verbosity detailed

    - name: Summarize format check
      if: always()
      shell: pwsh
      run: |
        $status = if ('${{ needs.change-classification.outputs.needs_format }}' -eq 'true') { '${{ job.status }}' } else { 'skipped' }
        $summary = @"
        ## Code Format Check

        - Status: `$status`
        - Triggered by scope: `needs_format=${{ needs.change-classification.outputs.needs_format }}`
        - Cache: `enabled`
        - Target: `godot/scripts/lattice/Lattice.csproj`
        "@

        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

  build-test:
    name: Build & Test (windows-latest, ${{ matrix.configuration }})
    needs: change-classification
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Skip build and test
      if: needs.change-classification.outputs.docs_only == 'true'
      run: echo "Docs-only change detected. Skipping build and test."

    - name: Checkout
      if: needs.change-classification.outputs.docs_only != 'true'
      uses: actions/checkout@v5

    - name: Run selected validation scopes
      if: needs.change-classification.outputs.docs_only != 'true'
      uses: ./.github/actions/dotnet-ci
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        cache: 'true'
        cache-dependency-path: |
          godot/Sideline.sln
          godot/Sideline.csproj
          godot/scripts/lattice/Lattice.csproj
          godot/scripts/lattice/Tests/Lattice.Tests.csproj
        script: |
          if ('${{ needs.change-classification.outputs.needs_sideline }}' -eq 'true')
          {
              dotnet restore godot/Sideline.csproj
              dotnet build godot/Sideline.csproj --no-restore --configuration ${{ matrix.configuration }} -nologo
          }

          if ('${{ needs.change-classification.outputs.needs_lattice }}' -eq 'true')
          {
              dotnet restore godot/scripts/lattice/Tests/Lattice.Tests.csproj
              dotnet build godot/scripts/lattice/Tests/Lattice.Tests.csproj --no-restore --configuration ${{ matrix.configuration }} -nologo
              dotnet test godot/scripts/lattice/Tests/Lattice.Tests.csproj --no-build --configuration ${{ matrix.configuration }} -nologo --verbosity normal --maxcpucount:1
          }

    - name: Summarize build and test
      if: always()
      shell: pwsh
      run: |
        $status = if ('${{ needs.change-classification.outputs.docs_only }}' -eq 'true') { 'skipped' } else { '${{ job.status }}' }
        $summary = @"
        ## Build & Test (windows-latest, ${{ matrix.configuration }})

        - Status: `$status`
        - docs_only: `${{ needs.change-classification.outputs.docs_only }}`
        - needs_sideline: `${{ needs.change-classification.outputs.needs_sideline }}`
        - needs_lattice: `${{ needs.change-classification.outputs.needs_lattice }}`
        - Cache: `enabled`
        "@

        Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
