# 发布覆盖率报告和基准结果到 GitHub Pages
name: Deploy Reports to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./_site/coverage

      - name: Download Benchmark Results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results
          path: ./_site/benchmark

      - name: Create Index Page
        run: |
          cat > ./_site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="UTF-8">
              <title>Lattice CI Reports</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
                  h1 { color: #333; border-bottom: 2px solid #0366d6; padding-bottom: 10px; }
                  .card { background: #f6f8fa; border-radius: 8px; padding: 20px; margin: 20px 0; }
                  .card h2 { margin-top: 0; color: #0366d6; }
                  .card a { display: inline-block; background: #0366d6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 6px; margin-top: 10px; }
                  .card a:hover { background: #0256c7; }
              </style>
          </head>
          <body>
              <h1>📊 Lattice CI Reports</h1>
              
              <div class="card">
                  <h2>🎯 Code Coverage</h2>
                  <p>View the latest code coverage report for the Lattice framework.</p>
                  <a href="./coverage/index.html">View Coverage Report</a>
              </div>
              
              <div class="card">
                  <h2>⚡ Performance Benchmarks</h2>
                  <p>View performance benchmark results comparing FP fixed-point operations.</p>
                  <a href="./benchmark/">View Benchmark Results</a>
              </div>
              
              <div class="card">
                  <h2>📁 Repository</h2>
                  <p>Back to GitHub repository.</p>
                  <a href="https://github.com/zgx197/Sideline">Go to Repository</a>
              </div>
          </body>
          </html>
          EOF

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
