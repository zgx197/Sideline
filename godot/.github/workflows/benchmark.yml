name: Performance Benchmark

on:
  schedule:
    # 每天凌晨 2 点运行
    - cron: '0 2 * * *'
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - 'godot/scripts/lattice/Math/**'

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: |
        dotnet restore godot/scripts/lattice/Lattice.csproj
        dotnet restore godot/Lattice.Tests/Lattice.Tests.csproj

    - name: Run Benchmarks
      run: |
        cd godot/Lattice.Tests
        dotnet run -c Release -- --filter "*FPBenchmarks*" \
          --exporters json \
          --artifacts artifacts

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: godot/Lattice.Tests/artifacts/

    - name: Compare with baseline
      run: |
        # 下载历史基准
        # 比较性能退化
        # 如果退化 > 10% 则标记失败
        echo "Performance comparison placeholder"

    - name: Create PR comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = 'godot/Lattice.Tests/artifacts/results';
          
          // 读取基准结果并创建评论
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '## Performance Benchmark Results\n\nSee artifacts for details.'
          });

  benchmark-report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'schedule'
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: benchmark-results
        path: benchmark-results/

    - name: Generate trend chart
      run: |
        # 使用 gnuplot 或其他工具生成趋势图
        echo "Generating performance trend chart..."

    - name: Commit to gh-pages
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git checkout gh-pages || git checkout --orphan gh-pages
        
        cp benchmark-results/* docs/benchmarks/
        
        git add docs/benchmarks/
        git commit -m "Update benchmark results $(date -I)" || echo "No changes"
        git push origin gh-pages
